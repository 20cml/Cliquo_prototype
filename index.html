<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cliquo — Campus Hangouts</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          display: ['Baloo 2', 'cursive'],

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  input, textarea { font-family: inherit; outline: none; }
  input::placeholder, textarea::placeholder { color: var(--ink3); }
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; }
  input[type="date"], input[type="time"] { -webkit-appearance: none; appearance: none; }
  .no-scrollbar::-webkit-scrollbar { width: 0; height: 0; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

  .clq {
    --screen:#15151f; --scr2:#1b1b27;
    --g1:.5; --g2:.3; --g3:.26;
    --ink:#f5f5fa; --ink2:rgba(255,255,255,.62); --ink3:rgba(255,255,255,.45); --ink4:rgba(255,255,255,.22);
    --card:rgba(44,44,62,.66); --cardbd:rgba(255,255,255,.1);
    --glass:rgba(255,255,255,.07); --glassbd:rgba(255,255,255,.12);
    --field:rgba(255,255,255,.05); --hair:rgba(255,255,255,.1);
    --status:#fff; --accent:#9b95f7; --tagbg:rgba(124,116,240,.16); --tagtxt:#bcb7f9;
    --homeind:rgba(255,255,255,.5); --searchico:rgba(255,255,255,.5); --clearbg:rgba(255,255,255,.25);
    --navbg:rgba(20,20,32,.55); --navbd:rgba(255,255,255,.12);
    --going:#4ade80; --chip:rgba(255,255,255,.06); --chipbd:rgba(255,255,255,.14); --chiptxt:rgba(255,255,255,.62);
    --disBg:rgba(255,255,255,.08); --disTxt:rgba(255,255,255,.35);
  }
  .clq[data-theme="light"] {
    --screen:#eceaf6; --scr2:#f6f6fc;
    --g1:.2; --g2:.13; --g3:.12;
    --ink:#18181b; --ink2:rgba(24,24,30,.64); --ink3:rgba(24,24,30,.46); --ink4:rgba(24,24,30,.28);
    --card:rgba(255,255,255,.74); --cardbd:rgba(24,24,40,.08);
    --glass:rgba(255,255,255,.66); --glassbd:rgba(24,24,40,.1);
    --field:rgba(24,24,40,.04); --hair:rgba(24,24,40,.09);
    --status:#18181b; --accent:#6d63f2; --tagbg:rgba(109,99,242,.1); --tagtxt:#4338ca;
    --homeind:rgba(24,24,40,.28); --searchico:rgba(24,24,40,.4); --clearbg:rgba(24,24,40,.2);
    --navbg:rgba(255,255,255,.74); --navbd:rgba(24,24,40,.08);
    --going:#16a34a; --chip:rgba(255,255,255,.72); --chipbd:rgba(24,24,40,.12); --chiptxt:#52525b;
    --disBg:rgba(24,24,40,.06); --disTxt:rgba(24,24,40,.4);
  }
  @keyframes clqSpin { to { transform: rotate(360deg); } }
  @keyframes clqFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes clqRise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes clqPush { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes clqUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes clqPop { 0% { opacity: 0; transform: scale(.6); } 60% { transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes clqToast { from { opacity: 0; transform: translate(-50%, 24px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes clqPulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  @keyframes clqDrift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(14px,18px) scale(1.08); } }
  @keyframes clqLogoTap { 0% { opacity: 0; transform: scale(.6); } 38% { opacity: 1; transform: scale(1.04); } 54% { transform: scale(.9); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }
  @keyframes clqRipple { 0% { opacity: 0; transform: scale(.7); } 12% { opacity: .55; } 100% { opacity: 0; transform: scale(2.1); } }
</style>
</head>
<body>
  <div id="root" class="clq" data-theme="dark"></div>

<script>
//=============================================================
// DATA
//=============================================================
const CAT = {
  Study:  { grad: 'linear-gradient(135deg,#6d63f2,#9d5bf0)', pill: 'rgba(124,116,240,.2)', pillText: '#7c74f0', av: 'linear-gradient(135deg,#8b85f5,#5b52e0)' },
  Social: { grad: 'linear-gradient(135deg,#f59e0b,#fb923c)', pill: 'rgba(245,158,11,.2)', pillText: '#d97706', av: 'linear-gradient(135deg,#fbbf24,#f59e0b)' },
  Sports: { grad: 'linear-gradient(135deg,#0ea5b7,#10b981)', pill: 'rgba(16,185,129,.2)', pillText: '#059669', av: 'linear-gradient(135deg,#34d399,#10b981)' },
  Arts:   { grad: 'linear-gradient(135deg,#d946a8,#ec4899)', pill: 'rgba(236,72,153,.2)', pillText: '#db2777', av: 'linear-gradient(135deg,#f472b6,#ec4899)' },
};

const EVENTS = [
  { id: 7, title: 'Sunrise Run Club', host: 'Amara Diallo', meta: 'Nursing · 2028', initials: 'AD', cat: 'Sports', mon: 'OCT', day: '12', when: 'Mon, Oct 12', time: '7:00 AM', end: '8:00 AM', location: 'Campus Gates', cap: 15, filled: 9, today: true, week: true, weekend: false,
    desc: "Easy 5K loop around campus to start the week right. All paces welcome — we regroup at the top of the hill and grab smoothies after. Bring water!",
    tags: ['Running', 'Fitness', 'RunClub', 'Morning'] },
  { id: 5, title: 'Intramural Soccer Pickup', host: 'Jordan Lee', meta: 'Commerce · 2027', initials: 'JL', cat: 'Sports', mon: 'OCT', day: '13', when: 'Tue, Oct 13', time: '6:30 PM', end: '8:00 PM', location: 'North Field', cap: 20, filled: 14, today: false, week: true, weekend: false,
    desc: "Casual pickup soccer, no experience needed. We split teams on the spot. Cleats optional, good vibes mandatory.",
    tags: ['Soccer', 'Pickup', 'Intramural', 'Fitness'] },
  { id: 1, title: 'Linear Algebra Midterm Prep Session', host: 'Alex Kim', meta: 'Software Eng · 2028', initials: 'AK', cat: 'Study', mon: 'OCT', day: '14', when: 'Wed, Oct 14', time: '2:00 PM', end: '4:00 PM', location: 'Maxwell Library · Rm 204', cap: 8, filled: 4, today: false, week: true, weekend: false,
    desc: "Hey everyone! I'm organizing a study group to go over the numerical linear algebra practice problems before our midterm next week. I'll book a room in the library and bring some coffee. Everyone is welcome — let's ace this test!",
    tags: ['LinearAlgebra', 'StudyGroup', 'MidtermPrep', 'Engineering'] },
  { id: 4, title: 'Biology 101 Lab Review', host: 'Sara Okafor', meta: 'Life Sci · 2028', initials: 'SO', cat: 'Study', mon: 'OCT', day: '15', when: 'Thu, Oct 15', time: '5:00 PM', end: '6:30 PM', location: 'Health Sci Bldg · Rm 110', cap: 10, filled: 6, today: false, week: true, weekend: false,
    desc: "Going over the cell biology lab and the practice quiz. Great for pre-med folks who want to lock in the diagrams before the test. I'll share my notes.",
    tags: ['Biology', 'LabReview', 'StudyGroup', 'PreMed'] },
  { id: 2, title: 'City Museum Trip & Coffee Hangout', host: 'Priya Nair', meta: 'History · 2027', initials: 'PN', cat: 'Social', mon: 'OCT', day: '16', when: 'Fri, Oct 16', time: '1:00 PM', end: '4:00 PM', location: 'Meet at Central Station', cap: 12, filled: 7, today: false, week: true, weekend: false,
    desc: "Checking out the new history exhibits and getting espresso after. Perfect low-key way to meet people if you're new to the city — I'm a transfer too!",
    tags: ['Museum', 'Coffee', 'History', 'Hangout'] },
  { id: 6, title: 'Open Mic & Poetry Night', host: 'Lena Cho', meta: 'Fine Arts · 2026', initials: 'LC', cat: 'Arts', mon: 'OCT', day: '16', when: 'Fri, Oct 16', time: '8:00 PM', end: '10:00 PM', location: 'The Grind Café', cap: 30, filled: 18, today: false, week: true, weekend: false,
    desc: "Share a poem, a song, or just come listen. Sign-up sheet at the door, super welcoming crowd. First-timers strongly encouraged!",
    tags: ['OpenMic', 'Poetry', 'Music', 'Arts'] },
  { id: 3, title: 'Casual Board Game Night', host: 'Marco Reyes', meta: 'Kinesiology · 2026', initials: 'MR', cat: 'Social', mon: 'OCT', day: '17', when: 'Sat, Oct 17', time: '7:00 PM', end: '10:00 PM', location: 'Student Centre Lounge', cap: 16, filled: 11, today: false, week: true, weekend: true,
    desc: "Playing Catan and a few party games. Snacks provided, come hang out and meet some new people! No skill required, we'll teach you.",
    tags: ['BoardGames', 'Catan', 'GameNight', 'Social'] },
  { id: 8, title: 'Hackathon Team Formation', host: 'Devon Park', meta: 'Computer Sci · 2027', initials: 'DP', cat: 'Study', mon: 'OCT', day: '18', when: 'Sun, Oct 18', time: '12:00 PM', end: '2:00 PM', location: 'Innovation Hub', cap: 24, filled: 5, today: false, week: true, weekend: true,
    desc: "Looking for teammates before next weekend's hackathon. Pitch your idea or join one — designers, coders, and first-timers all welcome.",
    tags: ['Hackathon', 'Coding', 'Teams', 'Engineering'] },
];

const STOPWORDS = new Set(('a an and the to of for in on at is are be we i you our your my me it this that with come will all my just get got got going go some new few before after up out so let lets everyone who what when where want here there they them his her she he their not no yes can do does did have has had if or but as by from into about over under more most much many any each every other than then them too very nice good great hey hi welcome bring meet make take want like really also even still back around top after first last next week through while during because where which would could should again things stuff gonna wanna doing done need bunch lots only just super pretty maybe perfect everyone folks people').split(' '));
const PHRASES = [
  ['linear algebra', 'LinearAlgebra'], ['board game', 'BoardGames'], ['board games', 'BoardGames'],
  ['open mic', 'OpenMic'], ['study group', 'StudyGroup'], ['study session', 'StudyGroup'],
  ['lab review', 'LabReview'], ['pre-med', 'PreMed'], ['pre med', 'PreMed'],
  ['run club', 'RunClub'], ['game night', 'GameNight'], ['midterm', 'MidtermPrep'],
];
const NICE = { coffee:'Coffee', exam:'Exam', practice:'Practice', problems:'Practice', running:'Running', run:'Running', soccer:'Soccer', poetry:'Poetry', music:'Music', hackathon:'Hackathon', coding:'Coding', code:'Coding', biology:'Biology', cell:'Biology', calculus:'Calculus', math:'Math', museum:'Museum', history:'History', espresso:'Coffee', smoothies:'Smoothies', design:'Design', designers:'Design', notes:'Notes', quiz:'Quiz', catan:'Catan', snacks:'Snacks', fitness:'Fitness', library:'Study', midterm:'MidtermPrep', team:'Teams', teammates:'Teams', poem:'Poetry' };

function capWord(w){ return w.charAt(0).toUpperCase()+w.slice(1); }
function extract(text){
  if(!text || !text.trim()) return [];
  let t = ' ' + text.toLowerCase().replace(/[^a-z0-9\s-]/g,' ').replace(/\s+/g,' ') + ' ';
  const out = [];
  for(const [ph,tag] of PHRASES){
    if(t.includes(' '+ph+' ') || t.includes(' '+ph)){ if(!out.includes(tag)) out.push(tag); t = t.split(ph).join(' '); }
  }
  const words = t.split(' ').map(w=>w.trim()).filter(Boolean);
  for(const w of words){
    if(out.length>=5) break;
    if(w.length<4 || STOPWORDS.has(w) || /^\d+$/.test(w)) continue;
    const tag = NICE[w] || capWord(w);
    if(!out.includes(tag)) out.push(tag);
  }
  return out.slice(0,5);
}
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return iso; return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function monOf(iso){ if(!iso) return 'OCT'; const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return 'OCT'; return d.toLocaleDateString('en-US',{month:'short'}).toUpperCase(); }
function dayOf(iso){ if(!iso) return '18'; const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return '18'; return String(d.getDate()); }
function clock12(hhmm){ const m=hhmm.match(/^(\d{1,2}):(\d{2})/); if(!m) return hhmm; let h=parseInt(m[1],10); const min=m[2]; h=h%12; if(h===0)h=12; return h+':'+min; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

//=============================================================
// STATE
//=============================================================
const S = {
  tab: 'home', detailId: null, showCreate: false,
  query: '', dateFilter: 'all',
  searching: false, searched: false,
  joined: {}, bump: {},
  cTitle:'', cDate:'', cTime:'', cLoc:'', cCap:8, cDesc:'', cTags:[], cAmpm:'PM',
  publishing: false, userEvents: [],
  toast: null, theme: 'dark', photoCount: 4,
  splash: true, splashFade: false,
  zoom: 'fit',
};
function fitScale(){ return Math.max(.3, Math.min(1, (window.innerHeight-56)/832, (window.innerWidth-32)/384)); }
function effScale(){ return S.zoom==='fit' ? fitScale() : S.zoom; }
function setZoom(dir){
  if(dir==='fit'){ S.zoom='fit'; render(); return; }
  const base = effScale();
  const next = Math.round((Math.min(1, Math.max(.3, base + dir*0.1)))*100)/100;
  S.zoom = next; render();
}
let searchT=null, toastT=null;

function allEvents(){ return S.userEvents.concat(EVENTS); }
function liveFilled(e){ return Math.min(e.cap, e.filled + (S.bump[e.id]||0)); }
function matches(e){
  const q = S.query.trim().toLowerCase();
  const df = S.dateFilter;
  if(df==='today' && !e.today) return false;
  if(df==='weekend' && !e.weekend) return false;
  if(df==='week' && !e.week) return false;
  if(!q) return true;
  const hay = (e.title+' '+e.host+' '+e.location+' '+e.desc+' '+e.tags.join(' ')).toLowerCase();
  return hay.includes(q);
}

function showToast(msg){ clearTimeout(toastT); S.toast=msg; render(); toastT=setTimeout(()=>{S.toast=null;render();},2600); }
function join(id){
  if(!S.joined[id]){ S.joined[id]=true; S.bump[id]=(S.bump[id]||0)+1; showToast("You're in! Added to your calendar"); }
  else { delete S.joined[id]; S.bump[id]=(S.bump[id]||1)-1; showToast('Left hangout · removed from calendar'); }
  render();
}
function go(tab){ S.tab=tab; S.detailId=null; S.showCreate=false; render(); }
function deleteEvent(id){
  delete S.joined[id]; delete S.bump[id];
  S.userEvents = S.userEvents.filter(e=>e.id!==id);
  S.detailId=null; showToast('Event deleted'); render();
}
function runSearch(){ clearTimeout(searchT); S.searching=true; S.searched=true; render(); searchT=setTimeout(()=>{S.searching=false;render();},650); }
function publish(){
  if(!S.cTitle.trim() || !S.cDesc.trim()) return;
  S.publishing=true; render();
  setTimeout(()=>{
    const id = 1000 + S.userEvents.length;
    const ev = { id, title:S.cTitle.trim(), host:'Jamie Chen', meta:'Computer Sci · 2027', initials:'JC', cat:'Study',
      mon:monOf(S.cDate), day:dayOf(S.cDate), when:fmtDate(S.cDate)||'Sat, Oct 18', time:(S.cTime?(clock12(S.cTime)+' '+S.cAmpm):'3:00 PM'), end:'',
      location:S.cLoc.trim()||'Campus', cap:S.cCap, filled:1, today:false, week:true, weekend:false,
      desc:S.cDesc.trim(), tags:extract(S.cDesc).slice(0,4) };
    S.joined[id]=true;
    S.publishing=false; S.showCreate=false; S.tab='home';
    S.userEvents=[ev].concat(S.userEvents);
    S.cTitle=''; S.cDate=''; S.cTime=''; S.cLoc=''; S.cCap=8; S.cDesc=''; S.cTags=[]; S.cAmpm='PM';
    showToast('Hangout published — live on the feed!'); render();
  },1400);
}

//=============================================================
// ICONS (small helpers)
//=============================================================
const I = {
  cal: 'rgba',
};
function calIco(c){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="4.5" width="18" height="16" rx="3" stroke="${c}" stroke-width="2"/><path d="M3 9h18" stroke="${c}" stroke-width="2"/></svg>`; }
function pinIco(c){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 21s7-5.6 7-11a7 7 0 1 0-14 0c0 5.4 7 11 7 11Z" stroke="${c}" stroke-width="2"/><circle cx="12" cy="10" r="2.4" stroke="${c}" stroke-width="2"/></svg>`; }

//=============================================================
// RENDER PIECES
//=============================================================
function feedCard(e){
  const c = CAT[e.cat];
  const filled = liveFilled(e);
  const left = e.cap - filled;
  const joined = !!S.joined[e.id];
  const snippet = e.desc.length>96 ? e.desc.slice(0,96).trim()+'…' : e.desc;
  const spots = joined ? (filled+'/'+e.cap+' going · you\u2019re in') : (left<=0 ? 'Full' : left+' of '+e.cap+' spots left');
  const joinBtn = joined
    ? `style="background:rgba(34,197,94,.9);color:#fff;box-shadow:none"`
    : `style="background:linear-gradient(135deg,#8b85f5,#5b52e0);color:#fff;box-shadow:0 6px 16px -5px rgba(124,116,240,.8),inset 0 1px 0 rgba(255,255,255,.3)"`;
  return `
  <div class="bg-[var(--card)] border-t border-b border-[var(--hair)] overflow-hidden backdrop-blur-xl" style="animation:clqRise .4s ease both">
    <div data-act="open" data-id="${e.id}" class="flex items-center gap-2.5 px-3.5 py-3 cursor-pointer">
      <div class="w-[38px] h-[38px] rounded-full flex-none flex items-center justify-center text-white font-extrabold text-sm" style="background:${c.av};box-shadow:inset 0 1px 0 rgba(255,255,255,.25)">${e.initials}</div>
      <div class="flex-1 min-w-0">
        <div class="text-[13.5px] font-bold text-[var(--ink)]">${esc(e.host)}</div>
        <div class="text-[11.5px] text-[var(--ink3)] font-medium">${esc(e.meta)}</div>
      </div>
      <div class="text-[11px] font-extrabold uppercase tracking-wide px-2.5 py-1 rounded-lg" style="color:${c.pillText};background:${c.pill};border:1px solid rgba(255,255,255,.08)">${e.cat}</div>
    </div>
    <div data-act="open" data-id="${e.id}" class="h-[150px] flex items-end justify-start p-3.5 text-white cursor-pointer" style="background:${c.grad}">
      <span class="font-mono text-[11px] tracking-[1.5px] uppercase opacity-85">${e.cat} · event photo</span>
    </div>
    <div class="px-[15px] pt-[13px] pb-[15px]">
      <div data-act="open" data-id="${e.id}" class="cursor-pointer text-[17px] font-extrabold text-[var(--ink)] tracking-[-.3px] leading-tight">${esc(e.title)}</div>
      <div class="flex flex-wrap gap-x-3.5 gap-y-1.5 mt-2">
        <span class="inline-flex items-center gap-1.5 text-[12.5px] text-[var(--ink2)] font-semibold">${calIco('var(--accent)')}${esc(e.when)}</span>
        <span class="inline-flex items-center gap-1.5 text-[12.5px] text-[var(--ink2)] font-semibold">${pinIco('var(--accent)')}${esc(e.location)}</span>
      </div>
      <div class="text-[13.5px] text-[var(--ink2)] leading-relaxed mt-2.5">${esc(snippet)}</div>
      <div class="flex flex-wrap gap-1.5 mt-3">
        ${e.tags.map(t=>`<span class="text-[11.5px] font-bold text-[var(--tagtxt)] bg-[var(--tagbg)] px-2.5 py-1 rounded-lg">#${esc(t)}</span>`).join('')}
      </div>
      <div class="flex items-center justify-between mt-3.5">
        <span class="text-[12.5px] text-[var(--ink3)] font-semibold">${spots}</span>
        <button data-act="join" data-id="${e.id}" class="border-0 cursor-pointer text-[13px] font-extrabold px-[18px] py-2 rounded-xl transition-all" ${joinBtn}>${joined?'Going ✓':'Join'}</button>
      </div>
    </div>
  </div>`;
}

function dateChipsHtml(){
  const defs = [['all','Anytime'],['today','Today'],['week','This week'],['weekend','This weekend']];
  return defs.map(([k,label])=>{
    const active = S.dateFilter===k;
    const st = active
      ? `border:1px solid rgba(124,116,240,.6);background:rgba(124,116,240,.25);color:var(--tagtxt)`
      : `border:1px solid var(--chipbd);background:var(--chip);color:var(--chiptxt)`;
    return `<button data-act="date" data-id="${k}" class="flex-none cursor-pointer font-bold text-[11px] px-2.5 py-1.5 rounded-[10px] whitespace-nowrap backdrop-blur-md" style="${st}">${label}</button>`;
  }).join('');
}

function homeScreen(){
  let feed = allEvents().filter(matches);
  const qTrim = S.query.trim();
  const resultLabel = (feed.length===1?'1 hangout':feed.length+' hangouts') + (qTrim?` for \u201c${esc(qTrim)}\u201d`:'');
  const list = S.searching
    ? `<div class="flex flex-col items-center gap-3.5 py-14">
         <div class="w-8 h-8 border-[3px] border-[var(--hair)] rounded-full" style="border-top-color:#8b85f5;animation:clqSpin .7s linear infinite"></div>
         <span class="text-[13px] text-[var(--ink3)] font-semibold">Finding hangouts…</span>
       </div>`
    : feed.length===0
      ? `<div class="px-[30px] py-14 text-center text-[var(--ink3)]">
           <div class="text-[40px] mb-2">🔍</div>
           <div class="font-bold text-[var(--ink)] text-base">No hangouts found</div>
           <div class="text-[13.5px] mt-1">Try a different keyword or widen the dates.</div>
         </div>`
      : `<div class="flex flex-col gap-2 pt-3.5">${feed.map(feedCard).join('')}</div>`;
  return `
  <div class="no-scrollbar absolute inset-0 overflow-y-auto pt-[46px] pb-24" style="animation:clqFade .25s ease">
    <div class="flex items-center justify-between px-[18px] pt-1">
      <span class="inline-flex items-center">
        <span class="font-display text-[32px] font-extrabold tracking-[-.3px]" style="background:linear-gradient(120deg,#8b85f5,#d456c4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Cliquo</span>

        <div class="flex items-center gap-2.5 mt-4 pb-4 border-b border-[var(--hair)]">
          <div class="w-10 h-10 rounded-full flex-none flex items-center justify-center text-white font-extrabold text-[15px]" style="background:${c.av};box-shadow:inset 0 1px 0 rgba(255,255,255,.25)">${e.initials}</div>
          <div><div class="text-[11px] text-[var(--ink3)] font-bold uppercase tracking-wide">Hosted by</div><div class="text-sm font-bold text-[var(--ink)]">${esc(e.host)} · ${esc(e.meta)}</div></div>

  <div class="absolute inset-0 z-50 bg-[var(--scr2)] flex flex-col" style="animation:clqUp .32s cubic-bezier(.32,.72,0,1)">
    <div class="flex items-center justify-between px-4 pt-[54px] pb-3.5 border-b border-[var(--hair)]">
      <div data-act="closeCreate" class="cursor-pointer text-[15px] font-semibold text-[var(--ink2)]">Cancel</div>
      <div class="text-base font-extrabold text-[var(--ink)]">New hangout</div>
      <button data-act="publish" class="border-0 text-[15px] font-extrabold px-4 py-2 rounded-xl ${valid?'cursor-pointer':'cursor-default'}" style="${postStyle}">Post</button>
    </div>
    ${body}
  </div>`;
}

function navBar(){
  const active = (t)=> S.tab===t ? 'var(--accent)' : 'var(--chiptxt)';
  const homeFill = S.tab==='home' ? 'rgba(165,160,251,.28)' : 'none';
  const profFill = S.tab==='profile' ? 'rgba(165,160,251,.28)' : 'none';
  return `
  <div class="absolute left-3.5 right-3.5 bottom-[18px] z-[45] h-[54px] rounded-[27px] bg-[var(--navbg)] backdrop-blur-2xl border border-[var(--navbd)] flex items-center px-1.5" style="box-shadow:0 14px 40px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.16)">
    <div data-act="tab" data-id="home" class="flex-1 flex flex-col items-center gap-[3px] cursor-pointer">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none"><path d="M4 11 12 4l8 7v8a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1v-8Z" stroke="${active('home')}" stroke-width="1.9" stroke-linejoin="round" fill="${homeFill}"/></svg>
      <span class="text-[10px] font-bold" style="color:${active('home')}">Home</span>
    </div>
    <div data-act="create" class="flex-1 flex justify-center cursor-pointer">
      <div class="w-[46px] h-[34px] rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#8b85f5,#5b52e0);box-shadow:0 8px 18px -4px rgba(124,116,240,.8),inset 0 1px 0 rgba(255,255,255,.35)"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/></svg></div>
    </div>
    <div data-act="tab" data-id="profile" class="flex-1 flex flex-col items-center gap-[3px] cursor-pointer">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="${active('profile')}" stroke-width="1.9" fill="${profFill}"/><path d="M4.5 20c.8-4 3.8-6.2 7.5-6.2S18.7 16 19.5 20" stroke="${active('profile')}" stroke-width="1.9" stroke-linecap="round" fill="${profFill}"/></svg>
      <span class="text-[10px] font-bold" style="color:${active('profile')}">Profile</span>
    </div>
  </div>`;
}

//=============================================================
// SHELL + RENDER
//=============================================================
function render(){
  const root = document.getElementById('root');
  root.setAttribute('data-theme', S.theme==='light'?'light':'dark');

  let screen = '';
  if(S.tab==='home') screen = homeScreen();
  else if(S.tab==='calendar') screen = calendarScreen();
  else if(S.tab==='profile') screen = profileScreen();

  const showNav = S.detailId==null && !S.showCreate;
  const detail = S.detailId!=null ? detailScreen() : '';
  const create = S.showCreate ? createScreen() : '';
  const toast = S.toast ? `
    <div class="absolute left-1/2 bottom-24 z-[80] -translate-x-1/2 text-white px-[18px] py-3.5 rounded-2xl text-[13.5px] font-bold whitespace-nowrap flex items-center gap-2.5" style="background:rgba(28,28,42,.82);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.14);box-shadow:0 14px 36px -8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.16);animation:clqToast .35s cubic-bezier(.32,.72,0,1)">
      <span class="inline-flex w-[22px] h-[22px] rounded-full items-center justify-center text-[13px]" style="background:#22c55e">✓</span>${esc(S.toast)}
    </div>` : '';
  const splash = S.splash ? `
    <div class="absolute inset-0 z-[100] bg-black flex items-center justify-center transition-opacity duration-500" style="opacity:${S.splashFade?0:1};pointer-events:${S.splashFade?'none':'auto'}">
      <div class="relative flex flex-col items-center">
        <div class="absolute top-1/2 left-1/2 w-[98px] h-[98px] -mt-[49px] -ml-[49px] rounded-full pointer-events-none" style="border:2px solid rgba(244,114,182,.6);animation:clqRipple 1.5s ease-out .75s both"></div>
        <div class="w-[98px] h-[98px] rounded-[27px] flex items-center justify-center" style="background:linear-gradient(140deg,#f472b6,#d946a8);box-shadow:0 16px 38px -8px rgba(236,72,153,.75),inset 0 1px 0 rgba(255,255,255,.38);animation:clqLogoTap 1.7s cubic-bezier(.34,1.56,.64,1) both">
          <svg width="58" height="58" viewBox="0 0 64 64"><path d="M46 20A18 18 0 1 0 46 44" fill="none" stroke="#fff" stroke-width="7.5" stroke-linecap="round"/><path d="M48 24l2.6 6.4L57 33l-6.4 2.6L48 42l-2.6-6.4L39 33l6.4-2.6Z" fill="#fff"/></svg>
        </div>
      </div>
    </div>` : '';

  const sc = effScale();
  const pct = Math.round(sc*100);
  const zoomBar = `
    <div class="fixed bottom-4 right-4 z-[120] flex items-center gap-1 bg-white/90 backdrop-blur border border-zinc-200 rounded-full px-1.5 py-1 select-none" style="box-shadow:0 6px 20px -6px rgba(0,0,0,.25)">
      <button data-act="zoomout" class="w-8 h-8 rounded-full flex items-center justify-center text-zinc-600 hover:bg-zinc-100 cursor-pointer text-xl font-semibold leading-none">−</button>
      <button data-act="zoomfit" class="min-w-[58px] h-8 px-2 rounded-full flex items-center justify-center text-[12px] font-bold cursor-pointer ${S.zoom==='fit'?'bg-zinc-900 text-white':'text-zinc-700 hover:bg-zinc-100'}">${S.zoom==='fit'?'Fit '+pct+'%':pct+'%'}</button>
      <button data-act="zoomin" class="w-8 h-8 rounded-full flex items-center justify-center text-zinc-600 hover:bg-zinc-100 cursor-pointer text-xl font-semibold leading-none">+</button>
    </div>`;
  root.innerHTML = `
  <div class="min-h-screen w-full flex items-center justify-center bg-white py-6 overflow-auto">
    ${zoomBar}
    <div class="relative flex-none" style="width:${Math.round(384*sc)}px;height:${Math.round(832*sc)}px">
    <div class="absolute top-0 left-0 w-[384px] h-[832px] rounded-[56px] bg-black p-[13px]" style="transform:scale(${sc});transform-origin:top left;box-shadow:0 50px 100px -20px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06),inset 0 0 2px 2px rgba(255,255,255,.05)">
      <div class="relative w-full h-full rounded-[44px] overflow-hidden bg-[var(--screen)] flex flex-col transition-colors duration-300">

        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
          <div class="absolute rounded-full" style="top:-90px;left:-70px;width:300px;height:300px;background:radial-gradient(circle,#5b52e0,transparent 68%);filter:blur(36px);opacity:var(--g1);animation:clqDrift 11s ease-in-out infinite"></div>
          <div class="absolute rounded-full" style="top:120px;right:-110px;width:300px;height:300px;background:radial-gradient(circle,#c026d3,transparent 68%);filter:blur(40px);opacity:var(--g2);animation:clqDrift 14s ease-in-out infinite reverse"></div>
          <div class="absolute rounded-full" style="bottom:-120px;left:30px;width:340px;height:340px;background:radial-gradient(circle,#0ea5b7,transparent 68%);filter:blur(46px);opacity:var(--g3);animation:clqDrift 16s ease-in-out infinite"></div>
        </div>

        <div class="absolute top-0 left-0 right-0 h-[52px] z-[60] flex items-start justify-between pointer-events-none" style="padding:17px 30px 0 46px">
          <span class="text-[15px] font-bold tracking-tight" style="color:var(--status)">9:41</span>
          <div class="flex gap-[7px] items-center pt-0.5">
            <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0" y="6.5" width="3" height="4.5" rx=".6" fill="var(--status)"/><rect x="4.5" y="4" width="3" height="7" rx=".6" fill="var(--status)"/><rect x="9" y="2" width="3" height="9" rx=".6" fill="var(--status)"/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill="var(--status)"/></svg>
            <svg width="22" height="11" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="var(--status)" stroke-opacity=".45" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.6" fill="var(--status)"/><rect x="24" y="4" width="1.5" height="4" rx=".7" fill="var(--status)" fill-opacity=".45"/></svg>
          </div>
        </div>
        <div class="absolute top-3 left-1/2 -translate-x-1/2 w-[114px] h-[33px] rounded-[20px] bg-black z-[70]"></div>

        <div class="relative flex-1 overflow-hidden z-[1]">
          ${screen}
          ${detail}
          ${create}
          ${showNav?navBar():''}
          ${toast}
        </div>

        <div class="absolute bottom-[7px] left-1/2 -translate-x-1/2 w-[128px] h-[5px] rounded-full z-[90] pointer-events-none" style="background:var(--homeind)"></div>
        ${splash}
      </div>
    </div>
    </div>
  </div>`;

  // restore focus for text inputs
  if(focusKey){
    const el = root.querySelector('[data-inp="'+focusKey+'"]');
    if(el){ el.focus(); try{ el.setSelectionRange(focusPos, focusPos); }catch(_){} }
  }
}

//=============================================================
// INTERACTIONS
//=============================================================
let focusKey=null, focusPos=0;

document.addEventListener('input', (ev)=>{
  const t = ev.target.closest('[data-inp]');
  if(!t) return;
  const key = t.getAttribute('data-inp');
  focusKey = key; focusPos = t.selectionStart||0;
  if(key==='query'){ S.query=t.value; runSearch(); return; }
  if(key==='cDesc'){ S.cDesc=t.value; S.cTags=extract(t.value); render(); return; }
  S[key]=t.value;
  if(key==='cTitle') render();
});

document.addEventListener('click', (ev)=>{
  const t = ev.target.closest('[data-act]');
  if(!t) return;
  const act = t.getAttribute('data-act');
  const id = t.getAttribute('data-id');
  focusKey=null;
  switch(act){
    case 'tab': go(id); break;
    case 'open': S.detailId=parseInt(id,10); render(); break;
    case 'closeDetail': S.detailId=null; render(); break;
    case 'join': join(parseInt(id,10)); break;
    case 'delete': deleteEvent(parseInt(id,10)); break;
    case 'date': S.dateFilter=id; if(S.searched) runSearch(); else render(); break;
    case 'clear': S.query=''; runSearch(); break;
    case 'theme': S.theme = S.theme==='light'?'dark':'light'; render(); break;
    case 'create': S.showCreate=true; render(); break;
    case 'closeCreate': S.showCreate=false; render(); break;
    case 'publish': publish(); break;
    case 'ampm': S.cAmpm=id; render(); break;
    case 'capinc': S.cCap=Math.min(50,S.cCap+1); render(); break;
    case 'capdec': S.cCap=Math.max(2,S.cCap-1); render(); break;
    case 'addphoto': S.photoCount++; render(); break;
    case 'zoomin': setZoom(1); break;
    case 'zoomout': setZoom(-1); break;
    case 'zoomfit': setZoom('fit'); break;
  }
});

//=============================================================
// BOOT
//=============================================================
render();
let rzT=null;
window.addEventListener('resize', ()=>{ if(S.zoom!=='fit') return; clearTimeout(rzT); rzT=setTimeout(render,120); });
setTimeout(()=>{ S.splashFade=true; render(); }, 2700);
setTimeout(()=>{ S.splash=false; render(); }, 3250);
</script>
</body>
</html>
